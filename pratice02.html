<!DOCTYPE html>
<html>
<style>
table, th, td {
border:1px solid rgb(189, 10, 10);
}
</style>
<body>
<h2>TD elements define table cells</h2>
<table style="width:100%">
<tr>
<td>Emil</td>
<td>Tobias</td>
<td>Linus</td>
</tr>
<tr>
    <td>12</td>
    <td>45</td>
    <td>35</td>
</tr>
<tr>
    <th>opo</th>
    <th>vine</th>
    <th>rpner</th>
</tr>
</table>
<p>To understand the example better, we have added borders to the table.</p>
</body> 
</html>
